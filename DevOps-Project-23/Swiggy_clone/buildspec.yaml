version: 0.2

env:
  parameter-store:
    SONAR_TOKEN: /cicd/sonar/sonar-token

phases:
  install:
    runtime-versions:
      python: 3.11
      java: corretto17
    commands:
      - echo "Installing SonarScanner..."
      - export SONAR_SCANNER_VERSION=5.0.1.3006
      - wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$SONAR_SCANNER_VERSION-linux.zip
      - unzip sonar-scanner-cli-$SONAR_SCANNER_VERSION-linux.zip
      - export PATH=$PATH:$PWD/sonar-scanner-$SONAR_SCANNER_VERSION-linux/bin

  pre_build:
    commands:
      - echo "Login to ECR..."
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 317968578233.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - cd DevOps-Project-23/Swiggy_clone

      - echo "Running SonarQube analysis..."
      - sonar-scanner -Dsonar.projectKey=swiggy -Dsonar.sources=. -Dsonar.host.url=http://34.228.64.110:9000 -Dsonar.login=$SONAR_TOKEN

      - echo "Building Docker image..."
      - docker build -t swiggy-app .

      - echo "Tagging image..."
      - docker tag swiggy-app:latest 317968578233.dkr.ecr.us-east-1.amazonaws.com/swiggy-app:latest

      - echo "Pushing image..."
      - docker push 317968578233.dkr.ecr.us-east-1.amazonaws.com/swiggy-app:latest

  post_build:
    commands:
      - echo "Build completed"

artifacts:
  files:
    - appspec.yaml
